# Supabase — Học cùng Bee
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "hoc-cung-bee"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[db.migrations]
enabled = true

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["exp://localhost:8081"]
enable_anonymous_sign_ins = true
enable_signup = true

[auth.email]
enable_signup = false
enable_confirmations = false
